<script type="module">
import { createAgentManager } from 'https://esm.sh/@d-id/client-sdk@1.1.53';

const data-agent-id= "v2_agt_Z7uYXWFx"
const CLIENT_KEY  = 'Z29vZ2xlLW9hdXRoMnwxMDg1MzgzODIxMDg4OTU5MjE2MzA6dUtILVVlUFhjeFNUZS1lNjV2VG5t';
const N8N_WEBHOOK = 'https://rafa5555.app.n8n.cloud/webhook/salon-bot/v1/chat/completions';

const videoEl   = document.getElementById('avatar-video');
const inputEl   = document.getElementById('user-input');
const btnEl     = document.getElementById('send-btn');
const micBtn    = document.getElementById('mic-btn');
const statusEl  = document.getElementById('status');
const chatArea  = document.getElementById('chat-area');

let agentManager = null;
let connected    = false;
let stream       = null;

function setStatus(s) { statusEl.textContent = s; }
function setReady(yes) {
  inputEl.disabled = !yes;
  btnEl.disabled   = !yes;
  micBtn.disabled  = !yes;
}

function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = 'msg msg-' + type;
  div.textContent = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

const callbacks = {
  onSrcObjectReady(value) {
    stream = value;
    videoEl.srcObject = value;
    videoEl.muted = true;
    videoEl.play().catch(() => {});
  },
  onConnectionStateChange(state) {
    setStatus(state);
    if (state === 'connected') {
      connected = true;
      setReady(true);
      setStatus('Connected ✓');
    }
  },
  onVideoStateChange(state) {
    if (state !== 'STOP') {
      videoEl.srcObject = stream;
      videoEl.muted = false;
      setStatus('Speaking...');
    }
  },
  onError(e) {
    console.error(e);
    setStatus('Error');
  }
};

function init() {
  setStatus('Connecting...');
  createAgentManager(AGENT_ID, {
    auth: { type: 'key', clientKey: CLIENT_KEY },
    callbacks
  })
  .then(manager => {
    agentManager = manager;
    return agentManager.connect();
  })
  .catch(e => {
    setStatus('Failed');
    console.error(e);
  });
}

init();

async function send() {
  const text = inputEl.value.trim();
  if (!text || !connected) return;

  inputEl.value = '';
  setReady(false);

  addMessage(text, 'user');

  try {
    const res = await fetch(N8N_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: text }],
        stream: false
      })
    });

    const data = await res.json();

    let reply = data.reply ?? data.output ?? data.text ?? data.message
             ?? data.choices?.[0]?.message?.content;

    if (!reply) throw new Error('No reply');

    addMessage(reply, 'bot');

    await agentManager.speak({
      type: 'text',
      input: reply
    });

  } catch (e) {
    console.error(e);
    addMessage('Error, try again', 'bot');
  }

  setReady(true);
}

btnEl.addEventListener('click', send);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') send();
});
</script>
