<script type="module">
document.addEventListener("DOMContentLoaded", () => {

import { createAgentManager } from 'https://esm.sh/@d-id/client-sdk';

const AGENT_ID    = 'v2_agt_Z7uYXWFx';
const CLIENT_KEY  = 'Z29vZ2xlLW9hdXRoMnwxMDg1MzgzODIxMDg4OTU5MjE2MzA6dUtILVVlUFhjeFNUZS1lNjV2VG5t';
const N8N_WEBHOOK = 'https://rafa5555.app.n8n.cloud/webhook/salon-bot/v1/chat/completions';

const videoEl   = document.getElementById('avatar-video');
const inputEl   = document.getElementById('user-input');
const btnEl     = document.getElementById('send-btn');
const statusEl  = document.getElementById('status');
const chatArea  = document.getElementById('chat-area');

if (!statusEl || !btnEl) {
  console.error("DOM not loaded properly");
  return;
}

let agentManager = null;
let connected = false;

function setStatus(s){ statusEl.textContent = s; }
function setReady(v){
  inputEl.disabled = !v;
  btnEl.disabled = !v;
}

function addMessage(text, type){
  const div = document.createElement('div');
  div.className = 'msg msg-' + type;
  div.textContent = text;
  chatArea.appendChild(div);
}

const callbacks = {
  onConnectionStateChange(state){
    console.log("DID STATE:", state);
    setStatus(state);
    if(state === 'connected'){
      connected = true;
      setReady(true);
    }
  },
  onError(e){
    console.error("DID ERROR:", e);
    setStatus('Error');
  }
};

async function init(){
  setStatus('Connecting...');
  try{
    agentManager = await createAgentManager(AGENT_ID, {
      auth: { type: 'key', clientKey: CLIENT_KEY },
      callbacks
    });
    await agentManager.connect();
  }catch(e){
    console.error(e);
    setStatus('Failed');
  }
}

init();

btnEl.addEventListener('click', async () => {
  const text = inputEl.value.trim();
  if(!text || !connected) return;

  inputEl.value = '';
  addMessage(text, 'user');

  try{
    const res = await fetch(N8N_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: text }]
      })
    });

    const data = await res.json();
    console.log("N8N:", data);

    const reply = data.reply || data.output || data.text;

    addMessage(reply || "No reply", 'bot');

    if(reply){
      await agentManager.speak({ type: 'text', input: reply });
    }

  }catch(e){
    console.error(e);
  }
});

});
</script>
